name: 🚀 CI/CD - Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # TEST & BUILD
  build:
    runs-on: ubuntu-latest
    name: 🧪 Test & Build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🗄️ Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: 🏗️ Build application
        run: npm run build

      - name: ✅ Build successful
        run: echo "✅ Build completed successfully!"

  # DEPLOY TO VPS
  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: 🌐 Deploy to VPS
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "================================"
            echo "🔄 Starting Deployment..."
            echo "================================"
            
            cd /home/debian/PROJETS/Mouka/ife-food-backend
            
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps

            echo "🗄️ Syncing database schema..."
            npx prisma db push

            echo "🔧 Generating Prisma client (Prisma 7+ ne le fait PLUS auto après db push)..."
            # Sans cette étape, le client TS reste stale -> build échoue sur
            # les nouveaux modèles (UserAddress, ProductCategory.professional...).
            # On nuke UNIQUEMENT le dossier .prisma (client compilé), JAMAIS
            # @prisma/client (le package npm lui-même) - sinon prisma generate
            # échoue avec "Could not resolve @prisma/client" (confirmé run 18/05).
            rm -rf node_modules/.prisma
            npx prisma generate

            echo "🏗️ Building..."
            npm run build
            
            echo "🔄 Restarting application..."
            pm2 restart ife-food-api
            pm2 save
            
            echo "✅ Deployment completed!"
            pm2 status

      - name: ✅ Deployment Success
        if: success()
        run: echo "🎉 Deployment successful on VPS!"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "⚠️ Deployment failed. Check logs above."
